services:
  qdrant:
    image: qdrant/qdrant:v1.9.5
    container_name: vector-demo-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage

  app:
    build: ./app
    container_name: vector-demo-app
    ports:
      - "8000:8000"
    environment:
      QDRANT_URL: http://qdrant:6333
      COLLECTION_NAME: demo_documents
      EMBEDDING_MODEL: sentence-transformers/all-MiniLM-L6-v2
      DATA_FILE: /app/data/sample_docs.json
    depends_on:
      - qdrant
    volumes:
      - ./data:/app/data

volumes:
  qdrant_storage:
