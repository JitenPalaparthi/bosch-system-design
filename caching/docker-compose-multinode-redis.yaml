version: "3.9"

services:
  redis-1:
    image: redis:7.2
    container_name: redis-1
    command: >
      redis-server
      --port 7001
      --cluster-enabled yes
      --cluster-config-file nodes.conf
      --cluster-node-timeout 5000
      --appendonly yes
      --protected-mode no
      --bind 0.0.0.0
      --cluster-announce-ip redis-1
      --cluster-announce-port 7001
      --cluster-announce-bus-port 17001
    ports:
      - "7001:7001"
      - "17001:17001"
    networks:
      - redis-cluster-net
    volumes:
      - redis1-data:/data

