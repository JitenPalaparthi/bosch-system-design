services:
  flaky-service:
    build:
      context: ./flaky_service
    container_name: flaky-service
    environment:
      PORT: 5001
      FAILURE_RATE: 0.7
    ports:
      - "5001:5001"

  gateway-service:
    build:
      context: ./gateway_service
    container_name: gateway-service
    environment:
      PORT: 5000
      DOWNSTREAM_URL: http://flaky-service:5001/work
      FAILURE_THRESHOLD: 3
      RECOVERY_TIMEOUT: 8
      SUCCESS_THRESHOLD: 2
      REQUEST_TIMEOUT: 2
    depends_on:
      - flaky-service
    ports:
      - "5002:5000"
