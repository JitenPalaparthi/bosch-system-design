services:
  postgres:
    image: postgres:16
    container_name: cqrs-postgres
    command:
      - postgres
      - -c
      - wal_level=logical
      - -c
      - max_wal_senders=10
      - -c
      - max_replication_slots=10
    environment:
      POSTGRES_DB: ordersdb
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: apppass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appuser -d ordersdb"]
      interval: 10s
      timeout: 5s
      retries: 20
    networks: [cqrs-net]

  kafka:
    image: apache/kafka:4.2.0
    container_name: cqrs-kafka
    hostname: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/127.0.0.1/9092'"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 25s
    networks: [cqrs-net]

  kafka-connect:
    image: quay.io/debezium/connect:3.1.3.Final
    container_name: cqrs-kafka-connect
    ports:
      - "8083:8083"
    environment:
      BOOTSTRAP_SERVERS: kafka:9092
      GROUP_ID: cqrs-connect-cluster
      CONFIG_STORAGE_TOPIC: _connect_configs
      OFFSET_STORAGE_TOPIC: _connect_offsets
      STATUS_STORAGE_TOPIC: _connect_statuses
      CONFIG_STORAGE_REPLICATION_FACTOR: 1
      OFFSET_STORAGE_REPLICATION_FACTOR: 1
      STATUS_STORAGE_REPLICATION_FACTOR: 1
      KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      KEY_CONVERTER_SCHEMAS_ENABLE: "false"
      VALUE_CONVERTER_SCHEMAS_ENABLE: "false"
      CONNECT_REST_ADVERTISED_HOST_NAME: kafka-connect
      CONNECT_LOG4J_ROOT_LOGLEVEL: INFO
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8083/connectors >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 20
    networks: [cqrs-net]

  connector-init:
    image: curlimages/curl:8.7.1
    container_name: cqrs-connector-init
    depends_on:
      kafka-connect:
        condition: service_healthy
    volumes:
      - ./scripts:/scripts:ro
      - ./connectors:/connectors:ro
    entrypoint: ["sh", "/scripts/register-connector.sh"]
    restart: "no"
    networks: [cqrs-net]

  opensearch:
    image: opensearchproject/opensearch:2.15.0
    container_name: cqrs-opensearch
    environment:
      discovery.type: single-node
      bootstrap.memory_lock: "true"
      OPENSEARCH_INITIAL_ADMIN_PASSWORD: Admin123!
      DISABLE_SECURITY_PLUGIN: "true"
      OPENSEARCH_JAVA_OPTS: -Xms512m -Xmx512m
    ulimits:
      memlock:
        soft: -1
        hard: -1
    ports:
      - "9200:9200"
      - "9600:9600"
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200/_cluster/health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 25
    networks: [cqrs-net]

  dashboards:
    image: opensearchproject/opensearch-dashboards:2.15.0
    container_name: cqrs-dashboards
    ports:
      - "5601:5601"
    environment:
      OPENSEARCH_HOSTS: '["http://opensearch:9200"]'
      DISABLE_SECURITY_DASHBOARDS_PLUGIN: "true"
    depends_on:
      opensearch:
        condition: service_healthy
    networks: [cqrs-net]

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: cqrs-kafka-ui
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      KAFKA_CLUSTERS_0_KAFKACONNECT_0_NAME: debezium-connect
      KAFKA_CLUSTERS_0_KAFKACONNECT_0_ADDRESS: http://kafka-connect:8083
    depends_on:
      kafka:
        condition: service_healthy
      kafka-connect:
        condition: service_healthy
    networks: [cqrs-net]

  command-service:
    build: ./command-service
    container_name: cqrs-command-service
    environment:
      SERVICE_NAME: command-service
      FLASK_PORT: 8001
      DATABASE_URL: postgresql://appuser:apppass@postgres:5432/ordersdb
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy
    networks: [cqrs-net]

  projector-service:
    build: ./projector-service
    container_name: cqrs-projector-service
    environment:
      SERVICE_NAME: projector-service
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC: cdc.public.orders
      OPENSEARCH_URL: http://opensearch:9200
      OPENSEARCH_INDEX: orders_read
      OPENSEARCH_USERNAME: ""
      OPENSEARCH_PASSWORD: ""
    depends_on:
      kafka:
        condition: service_healthy
      opensearch:
        condition: service_healthy
      connector-init:
        condition: service_completed_successfully
    networks: [cqrs-net]

  query-service:
    build: ./query-service
    container_name: cqrs-query-service
    environment:
      SERVICE_NAME: query-service
      FLASK_PORT: 8003
      OPENSEARCH_URL: http://opensearch:9200
      OPENSEARCH_INDEX: orders_read
      OPENSEARCH_USERNAME: ""
      OPENSEARCH_PASSWORD: ""
    ports:
      - "8003:8003"
    depends_on:
      opensearch:
        condition: service_healthy
    networks: [cqrs-net]

volumes:
  postgres_data:
  opensearch_data:

networks:
  cqrs-net:
    driver: bridge
